<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ぱんだの分配管理</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Yu Gothic",sans-serif;
}
body{
    background:#f3f5f7;
    color: #333;
}
header{
    background:#1976d2;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}
nav{
    display:flex;
    background:white;
    box-shadow:0 2px 5px rgba(0,0,0,.15);
    position: sticky;
    top: 0;
    z-index: 100;
}
nav button{
    flex:1;
    border:none;
    background:white;
    padding:15px;
    font-size:15px;
    cursor:pointer;
    white-space: nowrap;
}
nav button.active{
    background:#2196f3; 
    color:white;
}
.page{
    display:none;
    padding:15px;
}
.page.active{
    display:block;
}
.card{
    background:white;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 2px 5px rgba(0,0,0,.15);
}
h2 {
    font-size: 18px;
    margin-bottom: 15px;
    border-left: 4px solid #1976d2;
    padding-left: 10px;
}
label {
    display: block;
    margin-top: 10px;
    font-weight: bold;
    font-size: 14px;
}
input,select{
    width:100%;
    padding:12px;
    margin-top:5px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size: 16px;
}
button.blue{
    background:#1976d2;
    color:white;
    border:none;
    padding:15px;
    border-radius:8px;
    width:100%;
    cursor:pointer;
    font-size: 16px;
    font-weight: bold;
}
button.red{
    background:#e53935;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
    font-size: 13px;
}
button.green{
    background:#4caf50;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:6px;
    cursor:pointer;
}
button.orange{
    background:#ff9800;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
    font-weight: bold;
    width: 100%;
}
button.gray{
    background:#757575;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:6px;
    cursor:pointer;
}
.sort-btn-group button {
    border: 1px solid #ccc;
    background: #fff;
    color: #333;
    transition: all 0.2s;
}
.sort-btn-group button.active {
    background: #e3f2fd !important;
    color: #1976d2 !important;
    border-color: #90caf9 !important;
    font-weight: bold;
}
.listItem{
    background:white;
    border-radius:10px;
    margin-bottom:10px;
    box-shadow:0 1px 4px rgba(0,0,0,.15);
    overflow: hidden;
    border: 3px solid #ccc; 
}
.listItem.border-unpaid {
    border: 3px solid #ccc;
    border-left: 6px solid #9e9e9e;
}
.listItem.border-part {
    border: 3px solid #ffe082;
    border-left: 6px solid #ffb300;
}
.listItem.border-done {
    border: 3px solid #a5d6a7;
    border-left: 6px solid #4caf50;
}
.small{
    color:#666;
    font-size:13px;
}
.flex-between {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.member-selector {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
    background: #f9f9f9;
    padding: 10px;
    border-radius: 8px;
}
.member-chip {
    display: flex;
    align-items: center;
    background: white;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ddd;
    cursor: pointer;
}
.member-chip input {
    width: auto;
    margin: 0 10px 0 0;
}
.summary-box {
    margin-top: 15px;
    padding: 10px;
    background: #e3f2fd;
    border-radius: 8px;
    text-align: center;
}
.status-badge {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
    white-space: nowrap;
}
.badge-unpaid { background: #e0e0e0; color: #666; }
.badge-part { background: #ffe082; color: #b78103; }
.badge-done { background: #c8e6c9; color: #2e7d32; }

.unreceived-badges-wrapper {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
    width: 100%;
}
.unreceived-name-badge {
    background: #ffebee;
    color: #c62828;
    border: 1px solid #ffcdd2;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 11px;
    white-space: nowrap;
    cursor: pointer;
    pointer-events: auto !important;
}
.unreceived-name-badge:hover {
    background: #ffcdd2;
}
.accordion-header {
    padding: 15px; 
    background: white;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    user-select: none;
    position: relative;
}
.accordion-header * {
    pointer-events: none;
}
.accordion-title-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    flex: 1;
}
.accordion-content {
    display: none;
    padding: 15px;
    background: #fafafa;
    border-top: 1px dashed #eee;
}
.listItem.open .accordion-content {
    display: block;
}
.listItem.open .accordion-header {
    background: #f5f9ff;
}
.receiver-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
}
.receiver-btn {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid #ccc;
    background: #fff;
    color: #555;
    transition: all 0.2s;
    user-select: none;
}
.receiver-btn.unreceived {
    background: #fff3e0;
    border-color: #ffb74d;
    color: #e65100;
}
.receiver-btn.received {
    background: #e8f5e9;
    border-color: #81c784;
    color: #2e7d32;
    font-weight: bold;
}
.edit-form-box {
    background: #f9f9f9;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
    border: 1px solid #1976d2;
}
.modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 15px;
}
.modal-overlay.active {
    display: flex;
}
.modal-window {
    background: white;
    width: 100%;
    max-width: 500px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    overflow: hidden;
    animation: fadeIn 0.2s ease-out;
}
@keyframes fadeIn {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
.modal-header {
    background: #1976d2;
    color: white;
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.modal-close-btn {
    background: none;
    border: none;
    color: white;
    font-size: 22px;
    cursor: pointer;
}
.modal-body {
    padding: 15px;
    max-height: 60vh;
    overflow-y: auto;
}
.modal-footer {
    padding: 15px;
    background: #f5f5f5;
    border-top: 1px solid #eee;
    display: flex;
    gap: 10px;
}
.unreceived-item-row {
    padding: 8px 0;
    border-bottom: 1px dashed #eee;
    font-size: 14px;
}
.modal-total-box {
    margin-top: 15px;
    padding: 12px;
    background: #ffebee;
    border-radius: 6px;
    font-size: 16px;
    color: #c62828;
    text-align: right;
}
#auth-screen {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #f3f5f7;
    z-index: 2000;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 15px;
}
.auth-card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    width: 100%;
    max-width: 400px;
    text-align: center;
}
#loading-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(255,255,255,0.7);
    z-index: 3000;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    color: #1976d2;
    font-size: 18px;
}
</style>
</head>
<body>

<div id="loading-overlay">通信中... ⏳</div>

<div id="auth-screen" style="display: none;">
    <div class="auth-card">
        <h2 style="border: none; padding: 0; font-size: 20px; margin-bottom: 10px;">ぱんだの分配管理</h2>
        <p class="small" style="margin-bottom: 20px;">初回起動のため管理用パスワードを入力してください。</p>
        <input type="password" id="authPassword" placeholder="パスワードを入力">
        <button class="blue" onclick="checkFirstAuth()" style="margin-top: 10px;">ログイン</button>
    </div>
</div>

<header>
ぱんだの分配管理
</header>

<nav>
<button id="nav-list" class="active" onclick="showPage('list',this)">一覧</button>
<button id="nav-member" onclick="showPage('member',this)">キャラ登録</button>
<button id="nav-new" onclick="showPage('new',this)">新規登録</button>
<button id="nav-config" onclick="showPage('config',this)">設定 ⚙️</button>
</nav>

<div id="list" class="page active">
    <div id="migration-box" class="card" style="background: #fff3e0; border: 2px dashed #ff9800; display: none;">
        <h2 style="border-left-color: #ff9800; margin-bottom: 5px;">⚠️ クラウドへの移行確認</h2>
        <p class="small" style="margin-bottom: 10px; color: #e65100;">スマホ（端末）に保存されている現在のデータを、スプレッドシートへ一度だけアップロードして同期を開始します。</p>
        <button class="orange" onclick="forceUploadLocalToCloud()">現在のスマホデータをクラウドに引き継ぐ</button>
    </div>

    <div class="card">
        <h2>分配一覧 <span style="font-size:12px; color:#666; font-weight:normal;">(タップで詳細を開閉 / 名前タップで一括管理)</span></h2>
        <div class="sort-btn-group" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px;">
            <button id="sort-date_desc" class="gray active" onclick="sortHistory('date_desc')" style="padding: 8px; font-size: 12px; border-radius: 6px; cursor: pointer;">日付（降順）</button>
            <button id="sort-date_asc" class="gray" onclick="sortHistory('date_asc')" style="padding: 8px; font-size: 12px; border-radius: 6px; cursor: pointer;">日付（昇順）</button>
            <button id="sort-status" class="gray" onclick="sortHistory('status')" style="padding: 8px; font-size: 12px; border-radius: 6px; cursor: pointer;">未分配優先</button>
        </div>
        <div style="text-align: right; margin-bottom: 10px;">
            <button class="green" onclick="loadFromCloud()" style="padding: 5px 10px; font-size: 12px; width: auto; border-radius: 4px;">🔄 クラウドから再読込</button>
        </div>
        <div id="history"></div>
    </div>
</div>

<div id="member" class="page">
    <div class="card">
        <h2>キャラ登録</h2>
        <form onsubmit="addMember(event)">
            <input id="memberName" placeholder="キャラ名を入力" autocomplete="off">
            <button type="submit" class="blue">登録する</button>
        </form>
        <br>
        <div id="memberList"></div>
    </div>
</div>

<div id="new" class="page">
    <div class="card">
        <h2>新規分配の作成</h2>
        <label>日付</label>
        <input type="date" id="date">
        <label>アイテム名</label>
        <input id="item" placeholder="例：漆黒の腕輪">
        <label>総売却価格 (A) ※未売却時は空欄</label>
        <input type="number" id="price" placeholder="例：1000000" oninput="calcPreview()">
        <label>参加メンバーを選択</label>
        <div id="participantList" class="member-selector"></div>
        <div class="summary-box">
            <div id="calc-preview">人数：0人 | 一人当たり：--- A</div>
        </div>
        <br>
        <button class="blue" onclick="saveHistory()">この内容で保存する</button>
    </div>
</div>

<div id="config" class="page">
    <div class="card">
        <h2>管理用パスワード変更</h2>
        <label>現在のパスワード</label>
        <input type="password" id="currentPassword" placeholder="現在のパスワードを入力">
        <label>新しいパスワード</label>
        <input type="password" id="newPassword" placeholder="新しいパスワードを入力">
        <label>新しいパスワード（確認用）</label>
        <input type="password" id="confirmPassword" placeholder="もう一度入力">
        <br><br>
        <button class="blue" onclick="changePassword()">パスワードを変更する</button>
    </div>
</div>

<div id="unreceivedModal" class="modal-overlay" onclick="closeModal()">
    <div class="modal-window" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span id="modalTitle">キャラクター名</span>
            <button class="modal-close-btn" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
            <div style="font-weight: bold; margin-bottom: 10px; font-size: 14px; color:#555;">未受取アイテム一覧:</div>
            <div id="modalItemList"></div>
            <div id="modalTotalBox" class="modal-total-box"></div>
        </div>
        <div class="modal-footer">
            <button id="modalBulkBtn" class="blue" style="padding: 10px; font-size: 14px;">この内容をすべて受取済にする</button>
            <button class="gray" onclick="closeModal()" style="padding: 10px; font-size: 14px;">閉じる</button>
        </div>
    </div>
</div>

<script>
// ⚠️ ご自身の Google ウェブアプリの URL を貼り付けてください
const GAS_URL = "https://script.google.com/macros/s/AKfycbxVuu_Xl3TijkN0K5aDeixopPn6rSZx3jrMlzSstnErXf20RxZkKbuGqPgYlw4oNPkBRA/exec";

let members = [];
let history = [];
let adminPassword = "1234";
let editingIndex = null;
let openIndexes = {}; 
let currentSortKey = "date_desc"; 

function showLoading(show) {
    document.getElementById("loading-overlay").style.display = show ? "flex" : "none";
}

// ⬇️ スマホに残っている初期データを強制的にクラウドに送信する関数
async function forceUploadLocalToCloud() {
    if(!confirm("現在画面に出ているデータをスプレッドシート（クラウド）へ上書きアップロードします。よろしいですか？")) return;
    
    // スマホのローカルストレージからデータを吸い上げる
    try {
        const localM = localStorage.getItem("members");
        const localH = localStorage.getItem("history");
        const localP = localStorage.getItem("adminPassword");
        
        if(localM) members = JSON.parse(localM);
        if(localH) history = JSON.parse(localH);
        if(localP) adminPassword = localP;
    } catch(e) {
        alert("端末データの解析に失敗しました。");
        return;
    }

    showLoading(true);
    try {
        const dataToSend = {
            members: members,
            history: history,
            adminPassword: adminPassword
        };
        const res = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify(dataToSend)
        });
        const result = await res.json();
        if(result.status === "success") {
            alert("クラウドへの初期データ移行が完了しました！これ以降は全員でリアルタイムに共有されます。");
            document.getElementById("migration-box").style.display = "none";
            // 完了後はクラウドから最新を取得して再描画
            await loadFromCloud();
        } else {
            alert("移行に失敗しました: " + result.message);
        }
    } catch (err) {
        alert("通信エラーが発生しました。GASのURLやデプロイ設定（全員になっているか）を確認してください。");
        console.error(err);
    } finally {
        showLoading(false);
    }
}

// クラウド（スプレッドシート）からデータを読み込む関数
async function loadFromCloud() {
    if(!GAS_URL || GAS_URL.startsWith("ここに")) {
        alert("GASのURLが設定されていません。コード内の GAS_URL を書き換えてください。");
        return;
    }
    showLoading(true);
    try {
        const response = await fetch(GAS_URL);
        const data = await response.json();
        
        // クラウド側が完全空っぽ（初期状態）かつローカルにデータがある場合
        const localM = localStorage.getItem("members");
        const hasLocalData = localM && JSON.parse(localM).length > 0;
        
        if ((!data.members || data.members.length === 0) && hasLocalData) {
            // オレンジ色の移行案内を表示する
            document.getElementById("migration-box").style.display = "block";
            
            // クラウドから読めない間は一旦スマホのデータを表示しておく
            members = JSON.parse(localStorage.getItem("members")) || [];
            history = JSON.parse(localStorage.getItem("history")) || [];
            adminPassword = localStorage.getItem("adminPassword") || "1234";
        } else {
            // 通常通りクラウドから読み込む
            document.getElementById("migration-box").style.display = "none";
            members = data.members || [];
            history = data.history || [];
            adminPassword = data.adminPassword || "1234";
        }
        
        drawMembers();
        updateSortButtonUI();
        drawHistory();
    } catch (err) {
        console.error("クラウド読み込みエラー。ローカルデータを仮表示します:", err);
        // 通信が失敗した場合は、ローカルデータを表示して移行ボタンを出す
        document.getElementById("migration-box").style.display = "block";
        members = JSON.parse(localStorage.getItem("members")) || [];
        history = JSON.parse(localStorage.getItem("history")) || [];
        adminPassword = localStorage.getItem("adminPassword") || "1234";
        
        drawMembers();
        updateSortButtonUI();
        drawHistory();
    } finally {
        showLoading(false);
    }
}

async function saveToCloud() {
    if(!GAS_URL || GAS_URL.startsWith("ここに")) return;
    showLoading(true);
    try {
        const dataToSend = {
            members: members,
            history: history,
            adminPassword: adminPassword
        };
        await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify(dataToSend)
        });
    } catch (err) {
        alert("クラウドへの保存に失敗しました。通信環境を確認してください。");
        console.error(err);
    } finally {
        showLoading(false);
    }
}

function checkFirstAuth() {
    const input = document.getElementById("authPassword").value;
    if (input === adminPassword) {
        localStorage.setItem("isPandaAuthed", "true");
        document.getElementById("auth-screen").style.display = "none";
        alert("認証に成功しました。");
    } else {
        alert("パスワードが違います。");
    }
}

function initAuth() {
    if (!localStorage.getItem("isPandaAuthed")) {
        document.getElementById("auth-screen").style.display = "flex";
    }
}

function sortHistory(key) {
    currentSortKey = key;
    if (key === 'date_desc') {
        history.sort((a, b) => new Date(b.date) - new Date(a.date));
    } else if (key === 'date_asc') {
        history.sort((a, b) => new Date(a.date) - new Date(b.date));
    } else if (key === 'status') {
        history.sort((a, b) => getStatusScore(a) - getStatusScore(b));
    }
    openIndexes = {};
    updateSortButtonUI();
    drawHistory();
}

function updateSortButtonUI() {
    document.querySelectorAll('.sort-btn-group button').forEach(btn => {
        btn.classList.remove('active');
    });
    const activeBtn = document.getElementById(`sort-${currentSortKey}`);
    if (activeBtn) {
        activeBtn.classList.add('active');
    }
}

function getStatusScore(h) {
    const doneCount = h.participants.filter(p => p.received).length;
    const total = h.participants.length;
    if (doneCount === 0) return 0;
    if (doneCount < total) return 1;
    return 2;
}

function showPage(id, obj){
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
    obj.classList.add("active");

    if(id === 'new') {
        drawParticipantSelector();
        calcPreview();
    }
    if(id === 'list') {
        editingIndex = null;
        updateSortButtonUI();
        drawHistory();
    }
}

async function changePassword(){
    const currentInput = document.getElementById("currentPassword").value;
    const newInput = document.getElementById("newPassword").value.trim();
    const confirmInput = document.getElementById("confirmPassword").value;

    if(currentInput !== adminPassword){
        alert("現在のパスワードが正しくありません");
        return;
    }
    if(newInput === ""){
        alert("新しいパスワードを入力してください");
        return;
    }
    if(newInput !== confirmInput){
        alert("新しいパスワードと確認用入力が一致しません");
        return;
    }

    adminPassword = newInput;
    await saveToCloud();
    alert("パスワードを変更しました！");
    
    document.getElementById("currentPassword").value = "";
    document.getElementById("newPassword").value = "";
    document.getElementById("confirmPassword").value = "";
    showPage('list', document.getElementById('nav-list'));
}

async function addMember(event){
    if(event) event.preventDefault();
    let name = document.getElementById("memberName").value.trim();
    if(name == "") return;
    if(members.includes(name)){
        alert("その名前は既に登録されています");
        return;
    }
    members.push(name);
    document.getElementById("memberName").value = "";
    await saveToCloud();
    drawMembers();
}

function drawMembers(){
    const list = document.getElementById("memberList");
    list.innerHTML = "";
    if(!members || members.length === 0){
        list.innerHTML = "<div class='small'>キャラが登録されていません</div>";
        return;
    }
    members.forEach((name, index) => {
        list.innerHTML += `
        <div class="listItem flex-between" style="padding:15px;">
            <b>${name}</b>
            <button class="red" onclick="deleteMember(${index})">削除</button>
        </div>
        `;
    });
}

async function deleteMember(index){
    if(!confirm("削除してもよろしいですか？")) return;
    members.splice(index, 1);
    await saveToCloud();
    drawMembers();
}

function drawParticipantSelector(){
    const area = document.getElementById("participantList");
    area.innerHTML = "";
    if(!members || members.length === 0){
        area.innerHTML = "<div class='small' style='grid-column:1/3'>キャラ登録を先に行ってください</div>";
        return;
    }
    members.forEach((name, index) => {
        area.innerHTML += `
        <label class="member-chip">
            <input type="checkbox" name="participants" value="${name}" onchange="calcPreview()">
            <span>${name}</span>
        </label>
        `;
    });
}

function calcPreview(){
    const priceInput = document.getElementById("price").value;
    const checkedMembers = document.querySelectorAll('input[name="participants"]:checked');
    const count = checkedMembers.length;
    
    let onePriceText = "--- A";
    if (priceInput !== "" && count > 0) {
        const price = Number(priceInput);
        onePriceText = Math.floor(price / count).toLocaleString() + " A";
    }
    
    document.getElementById("calc-preview").innerHTML = `
        <strong>参加人数：${count} 人</strong><br>
        <strong>一人当たり：${onePriceText}</strong>
    `;
}

async function saveHistory(){
    const date = document.getElementById("date").value;
    const item = document.getElementById("item").value.trim();
    const priceInput = document.getElementById("price").value;
    
    const checkedNodes = document.querySelectorAll('input[name="participants"]:checked');
    const selectedParticipants = Array.from(checkedNodes).map(node => node.value);
    const count = selectedParticipants.length;

    if(date == "" || item == "" || count <= 0 || (priceInput !== "" && Number(priceInput) < 0)){
        alert("入力内容を確認してください（アイテム名・日付・メンバー1人以上が必須です）");
        return;
    }

    const price = priceInput === "" ? null : Number(priceInput);
    const onePrice = price === null ? null : Math.floor(price / count);

    const participantStatus = selectedParticipants.map(name => ({
        name: name,
        received: false,
        receivedDate: null
    }));

    history.unshift({
        date: date,
        item: item,
        price: price,
        count: count,
        participants: participantStatus,
        onePrice: onePrice
    });

    await saveToCloud();
    drawHistory();

    document.getElementById("item").value = "";
    document.getElementById("price").value = "";
    document.getElementById("date").valueAsDate = new Date();

    alert("保存しました！");
    showPage('list', document.getElementById('nav-list'));
}

function toggleAccordion(index) {
    openIndexes[index] = !openIndexes[index];
    drawHistory();
}

function startEdit(index) {
    editingIndex = index;
    drawHistory();
}

function cancelEdit() {
    editingIndex = null;
    drawHistory();
}

async function updateHistory(index) {
    const editItem = document.getElementById(`editItem-${index}`).value.trim();
    const editPriceInput = document.getElementById(`editPrice-${index}`).value;
    
    if(editItem == "" || (editPriceInput !== "" && Number(editPriceInput) < 0)) {
        alert("正しく入力してください");
        return;
    }

    const currentData = history[index];
    const price = editPriceInput === "" ? null : Number(editPriceInput);
    const onePrice = price === null ? null : Math.floor(price / currentData.count);

    history[index].item = editItem;
    history[index].price = price;
    history[index].onePrice = onePrice;

    await saveToCloud();
    editingIndex = null;
    drawHistory();
    alert("変更を保存しました");
}

function drawHistory(){
    const area = document.getElementById("history");
    area.innerHTML = "";

    if(!history || history.length === 0){
        area.innerHTML = "<div class='small'>履歴がありません</div>";
        return;
    }

    history.forEach((h, index) => {
        const isOpen = openIndexes[index];
        const isEditing = (editingIndex === index);

        const total = h.participants.length;
        const doneCount = h.participants.filter(p => p.received).length;

        let badge = `<span class="status-badge badge-unpaid">未分配</span>`;
        let borderClass = "border-unpaid";
        
        if (doneCount > 0 && doneCount < total) {
            badge = `<span class="status-badge badge-part">一部済 (${doneCount}/${total})</span>`;
            borderClass = "border-part";
        } else if (doneCount === total) {
            badge = `<span class="status-badge badge-done">分配完了 🎉</span>`;
            borderClass = "border-done";
        }

        const unreceivedMembers = h.participants.filter(p => !p.received);
        let unreceivedBadgesHtml = "";
        if (unreceivedMembers.length > 0 && doneCount < total) {
            unreceivedBadgesHtml += `<div class="unreceived-badges-wrapper">`;
            unreceivedMembers.forEach(p => {
                unreceivedBadgesHtml += `<span class="unreceived-name-badge" onclick="event.stopPropagation(); openUnreceivedSummary('${p.name}')">${p.name}</span>`;
            });
            unreceivedBadgesHtml += `</div>`;
        } else {
            unreceivedBadgesHtml = `<div class="unreceived-badges-wrapper"></div>`;
        }

        const priceDisplay = h.price === null ? "未売却" : h.price.toLocaleString() + " A";
        const onePriceDisplay = h.onePrice === null ? "--- A" : h.onePrice.toLocaleString() + " A";

        if (isEditing) {
            area.innerHTML += `
            <div class="listItem ${borderClass}" style="padding:15px;">
                <div class="edit-form-box">
                    <label>アイテム名</label>
                    <input type="text" id="editItem-${index}" value="${h.item}">
                    <label>総売却価格 (空欄で未売却)</label>
                    <input type="number" id="editPrice-${index}" value="${h.price === null ? '' : h.price}">
                    <div style="margin-top:10px; display:flex; gap:10px;">
                        <button class="green" onclick="updateHistory(${index})">保存</button>
                        <button class="gray" onclick="cancelEdit()">キャンセル</button>
                    </div>
                </div>
            </div>
            `;
            return;
        }

        let receiverButtons = "";
        h.participants.forEach((p, pIdx) => {
            const btnClass = p.received ? "receiver-btn received" : "receiver-btn unreceived";
            const mark = p.received ? "⭕" : "❌";
            const dateDisplay = p.received && p.receivedDate ? `<br><span style="font-size: 11px; font-weight: normal; color: #555; opacity: 0.85;">${p.receivedDate}</span>` : "";
            
            receiverButtons += `
                <div class="${btnClass}" 
                     data-h-idx="${index}" 
                     data-p-idx="${pIdx}" 
                     style="text-align: center; line-height: 1.4; padding: 8px 12px; height: auto;">
                    ${p.name} [${mark}]${dateDisplay}
                </div>
            `;
        });

        const arrow = isOpen ? "▲ 閉じる" : "▼ 詳細";
        const openClass = isOpen ? `listItem ${borderClass} open` : `listItem ${borderClass}`;

        area.innerHTML += `
        <div class="${openClass}">
            <div class="accordion-header" onclick="toggleAccordion(${index})">
                <div class="flex-between" style="width: 100%;">
                    <div class="accordion-title-block">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            ${badge}
                            <span class="small" style="color:#777;">${h.date}</span>
                        </div>
                        <strong style="font-size:15px; margin-top: 2px;">${h.item}</strong>
                    </div>
                    <div>
                        <span style="font-size:12px; color:#1976d2; font-weight:bold;">${arrow}</span>
                    </div>
                </div>
                ${unreceivedBadgesHtml}
            </div>
            
            <div class="accordion-content">
                <div style="line-height:1.7; margin-bottom:12px; color:#444;">
                    💰 <b>総額:</b> ${priceDisplay}<br>
                    👥 <b>人数:</b> ${h.count} 人<br>
                    💎 <b style="font-size:15px; color:#1976d2;">一人当たり: ${onePriceDisplay}</b>
                </div>
                
                <div style="border-top:1px dashed #ddd; padding-top:10px; margin-bottom:15px;">
                    <span class="small" style="font-weight:bold; color:#555;">受取状況 (名前タップで切替):</span>
                    <div class="receiver-list">
                        ${receiverButtons}
                    </div>
                </div>
                <div class="flex-between" style="border-top:1px solid #eee; padding-top:10px;">
                    <button class="gray" style="padding:6px 14px; font-size:13px;" onclick="startEdit(${index})">再編集 ✏️</button>
                    <button class="red" onclick="deleteHistory(${index})">削除</button>
                </div>
            </div>
        </div>
        `;
    });

    setupReceiverButtonEvents();
}

function setupReceiverButtonEvents() {
    const buttons = document.querySelectorAll('.receiver-list .receiver-btn');
    buttons.forEach(btn => {
        let pressTimer = null;
        let isLongPress = false;

        const startPress = (e) => {
            isLongPress = false;
            pressTimer = setTimeout(() => {
                isLongPress = true;
                const hIdx = parseInt(btn.getAttribute('data-h-idx'));
                const pIdx = parseInt(btn.getAttribute('data-p-idx'));
                handleReceiverPress(hIdx, pIdx, true);
            }, 500);
        };

        const endPress = (e) => {
            clearTimeout(pressTimer);
            if (!isLongPress && e.type !== 'mouseleave') {
                const hIdx = parseInt(btn.getAttribute('data-h-idx'));
                const pIdx = parseInt(btn.getAttribute('data-p-idx'));
                handleReceiverPress(hIdx, pIdx, false);
            }
        };

        btn.addEventListener('touchstart', (e) => {
            e.stopPropagation();
            startPress(e);
        }, { passive: true });
        btn.addEventListener('touchend', (e) => {
            e.stopPropagation();
            e.preventDefault();
            endPress(e);
        });
        btn.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            if (e.button === 0) startPress(e);
        });
        btn.addEventListener('mouseup', (e) => {
            e.stopPropagation();
            if (e.button === 0) endPress(e);
        });
        btn.addEventListener('mouseleave', () => {
            clearTimeout(pressTimer);
        });
    });
}

async function handleReceiverPress(historyIndex, participantIndex, forceSelectDate) {
    const currentStatus = history[historyIndex].participants[participantIndex].received;
    const name = history[historyIndex].participants[participantIndex].name;

    if (currentStatus === true) {
        if (!confirm(`${name} さんを「未受取」に戻します。よろしいですか？`)) return;
        const userInput = prompt("受取を戻すには管理用パスワードを入力してください：");
        if (userInput === null) return;
        if (userInput !== adminPassword) {
            alert("パスワードが違います。変更できません。");
            return;
        }
        history[historyIndex].participants[participantIndex].received = false;
        history[historyIndex].participants[participantIndex].receivedDate = null;
    } else {
        let receiveDate = "";
        const todayStr = new Date().toISOString().split('T')[0];
        if (forceSelectDate) {
            receiveDate = prompt(`${name} さんの受取日を入力してください：`, todayStr);
            if (receiveDate === null) return;
        } else {
            receiveDate = todayStr;
        }
        history[historyIndex].participants[participantIndex].received = true;
        history[historyIndex].participants[participantIndex].receivedDate = receiveDate;
    }
    
    await saveToCloud();
    drawHistory();
}

function openUnreceivedSummary(memberName) {
    document.getElementById("modalTitle").innerText = `【${memberName}】の未受取明細`;
    const listArea = document.getElementById("modalItemList");
    listArea.innerHTML = "";
    
    let totalUnreceivedSum = 0;
    let matchCount = 0;

    history.forEach((h, hIdx) => {
        const pState = h.participants.find(p => p.name === memberName && !p.received);
        if (pState) {
            matchCount++;
            const priceText = h.onePrice === null ? "未売却" : h.onePrice.toLocaleString() + " A";
            if (h.onePrice !== null) {
                totalUnreceivedSum += h.onePrice;
            }
            listArea.innerHTML += `
                <div class="unreceived-item-row">
                    <span style="color:#777; font-size:12px;">[${h.date}]</span> 
                    <strong>${h.item}</strong> 
                    <span style="float:right; color:#1976d2; font-weight:bold;">${priceText}</span>
                </div>
            `;
        }
    });

    if (matchCount === 0) {
        listArea.innerHTML = "<div class='small'>未受取のアイテムはありません。</div>";
        document.getElementById("modalTotalBox").style.display = "none";
        document.getElementById("modalBulkBtn").style.display = "none";
    } else {
        document.getElementById("modalTotalBox").style.display = "block";
        document.getElementById("modalTotalBox").innerHTML = `未受取 合計金額: <strong>${totalUnreceivedSum.toLocaleString()} A</strong>`;
        
        const bulkBtn = document.getElementById("modalBulkBtn");
        bulkBtn.style.display = "block";
        bulkBtn.onclick = function() {
            bulkReceiveAction(memberName);
        };
    }
    document.getElementById("unreceivedModal").classList.add("active");
}

function closeModal() {
    document.getElementById("unreceivedModal").classList.remove("active");
}

async function bulkReceiveAction(memberName) {
    if (!confirm(`${memberName} さんの未受取アイテムをすべて「受取済」に変更します。よろしいですか？`)) return;
    const userInput = prompt("一括処理を行うには管理用パスワードを入力してください：");
    if (userInput === null) return;
    if (userInput !== adminPassword) {
        alert("パスワードが違います。変更できませんでした。");
        return;
    }
    const todayStr = new Date().toISOString().split('T')[0];
    const receiveDate = prompt("受取日を入力してください：", todayStr);
    if (receiveDate === null) return;

    history.forEach((h) => {
        h.participants.forEach((p) => {
            if (p.name === memberName && !p.received) {
                p.received = true;
                p.receivedDate = receiveDate;
            }
        });
    });

    await saveToCloud();
    drawHistory();
    closeModal();
    alert(`${memberName} さんの未受取アイテムを一括受取済にしました。`);
}

async function deleteHistory(index){
    if(!confirm("この履歴を完全に削除しますか？")) return;
    const userInput = prompt("削除するには管理用パスワードを入力してください：");
    if (userInput === null) return;
    if (userInput !== adminPassword) {
        alert("パスワードが違います。削除できません。");
        return;
    }
    history.splice(index, 1);
    delete openIndexes[index];
    await saveToCloud();
    drawHistory();
    alert("削除しました。");
}

async function initApp() {
    initAuth();
    await loadFromCloud();
    document.getElementById("date").valueAsDate = new Date();
}

initApp();
</script>
